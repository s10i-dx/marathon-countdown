<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>マラソン大会カウントダウン</title>
    <style>
      :root {
        --bg: #0a0f2b;
        --ink: #e8edff;
        --accent: #7ad7ff;
        --accent-2: #ffb347;
        --card: #121a3a;
        --muted: #b7c2e6;
        --border: #2a3a6a;
        --panel: #101733;
        --glow: rgba(122, 215, 255, 0.35);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Trebuchet MS", "Verdana", "Yu Gothic", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.08), transparent 40%),
          radial-gradient(circle at 80% 30%, rgba(122, 215, 255, 0.12), transparent 45%),
          radial-gradient(circle at 30% 80%, rgba(255, 180, 120, 0.08), transparent 45%),
          linear-gradient(180deg, #070b1f 0%, #0a1230 60%, #0b1638 100%);
        min-height: 100vh;
      }
      .page {
        max-width: 960px;
        margin: 24px auto 32px;
        background: linear-gradient(180deg, rgba(18, 26, 58, 0.95), rgba(12, 18, 44, 0.98));
        border-radius: 0;
        padding: 16px 16px 20px;
        box-shadow: 0 20px 45px rgba(4, 6, 16, 0.6);
        position: relative;
        border: 2px solid var(--border);
      }
      .counter {
        position: absolute;
        top: 10px;
        right: 10px;
        background:
          linear-gradient(180deg, rgba(15, 28, 44, 0.96), rgba(7, 12, 24, 0.98)),
          repeating-linear-gradient(
            90deg,
            rgba(122, 215, 255, 0.05) 0,
            rgba(122, 215, 255, 0.05) 8px,
            transparent 8px,
            transparent 16px
          );
        border: 1px solid rgba(122, 215, 255, 0.35);
        padding: 7px 10px 8px;
        font-size: 10px;
        display: grid;
        gap: 4px;
        min-width: 128px;
        box-shadow:
          0 0 0 1px rgba(255, 179, 71, 0.15),
          0 0 18px rgba(122, 215, 255, 0.12),
          inset 0 0 18px rgba(122, 215, 255, 0.08);
      }
      .counter-label {
        color: #8cb6d6;
        letter-spacing: 0.18em;
        font-size: 9px;
      }
      .counter-value {
        color: #ff9b3d;
        font-family: "Consolas", "Courier New", monospace;
        font-size: 24px;
        line-height: 1;
        letter-spacing: 0.14em;
        text-shadow:
          0 0 6px rgba(255, 155, 61, 0.55),
          0 0 14px rgba(255, 155, 61, 0.28);
      }
      header {
        padding: 12px 8px 10px;
        text-align: left;
        border-bottom: 2px solid var(--border);
        margin-bottom: 12px;
        background: linear-gradient(90deg, rgba(16, 25, 64, 0.9), rgba(10, 16, 43, 0.4));
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .logo-slot {
        width: 64px;
        height: 64px;
        display: grid;
        place-items: center;
      }
      .logo-slot img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        filter: drop-shadow(0 0 8px rgba(255, 179, 71, 0.35));
      }
      .header-text {
        flex: 1;
      }
      header h1 {
        margin: 0 0 6px;
        font-size: clamp(24px, 3.5vw, 36px);
        letter-spacing: 0.02em;
        line-height: 1.25;
      }
      .title-line {
        display: inline;
      }
      .title-line + .title-line::before {
        content: " ";
      }
      .title-break {
        display: none;
      }
      header p {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
      }
      main {
        margin: 0;
        padding: 0 6px 8px;
        display: grid;
        gap: 10px;
      }
      .card {
        background: linear-gradient(180deg, rgba(16, 23, 51, 0.95), rgba(10, 15, 35, 0.95));
        border-radius: 0;
        padding: 12px 12px;
        box-shadow: inset 0 0 0 1px rgba(122, 215, 255, 0.1);
        display: grid;
        gap: 10px;
        position: relative;
        overflow: hidden;
        border: 1px solid var(--border);
      }
      .card::after {
        content: "";
        position: absolute;
        inset: 0;
        border-left: 4px solid var(--border);
        opacity: 1;
        pointer-events: none;
      }
      .title {
        font-size: 16px;
        font-weight: 700;
      }
      .title a {
        color: var(--accent);
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .title a:visited {
        color: #b48cff;
      }
      .title a:hover,
      .title a:focus-visible {
        text-decoration: underline;
      }
      .date {
        font-size: 12px;
        color: var(--muted);
      }
      .countdown {
        display: flex;
        align-items: baseline;
        gap: 12px;
      }
      .countdown .days {
        font-size: 26px;
        font-weight: 700;
        color: #ff8a1f;
        font-family: "Trebuchet MS", "Verdana", monospace;
        text-shadow: 0 0 10px var(--glow);
      }
      .countdown .prefix,
      .countdown .suffix {
        color: #ffffff;
        text-shadow: none;
      }
      .countdown .label {
        font-size: 12px;
        color: var(--muted);
      }
      .badge {
        background: rgba(255, 179, 71, 0.15);
        color: #ffd089;
        display: inline-block;
        padding: 4px 10px;
        border-radius: 0;
        font-size: 12px;
        letter-spacing: 0.04em;
        border: 1px solid rgba(255, 179, 71, 0.6);
      }
      .results {
        border: 1px solid var(--border);
        background: rgba(7, 11, 31, 0.5);
        padding: 8px 10px;
      }
      .weather {
        border: 1px solid rgba(122, 215, 255, 0.25);
        background: rgba(122, 215, 255, 0.08);
        padding: 8px 10px;
        display: grid;
        gap: 4px;
      }
      .weather-label {
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
      }
      .weather-summary {
        font-size: 14px;
        color: var(--ink);
      }
      .weather-detail,
      .weather-updated,
      .weather-source a {
        font-size: 12px;
        color: var(--muted);
      }
      .weather-loading {
        color: var(--accent);
      }
      .weather-error {
        color: #ffd089;
      }
      .weather-source a {
        text-underline-offset: 2px;
      }
      .results summary {
        cursor: pointer;
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
      }
      .results summary::marker {
        color: var(--accent-2);
      }
      .results-body {
        margin-top: 8px;
        display: grid;
        gap: 4px;
        font-size: 12px;
        color: var(--muted);
      }
      .results-name {
        color: var(--ink);
        font-weight: 700;
      }
      footer {
        text-align: center;
        padding: 10px 8px 0;
        color: var(--muted);
        font-size: 12px;
        border-top: 2px solid var(--border);
        margin-top: 8px;
      }
      @media (min-width: 720px) {
        main {
          grid-template-columns: 1fr;
        }
        .card {
          min-height: 180px;
        }
      }
      @media (max-width: 430px) {
        header h1 {
          line-height: 1.0;
        }
        .title-line {
          display: block;
        }
        .title-line + .title-line::before {
          content: "";
        }
        .title-break {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="counter">
        <div class="counter-label">総アクセス数</div>
        <div class="counter-value" id="access-counter">...</div>
      </div>
      <header>
        <div class="logo-slot">
          <img src="iconRocket@4x.png" alt="ロケットロゴ" />
        </div>
        <div class="header-text">
          <h1>
            <span class="title-line">マラソン大会</span>
            <br class="title-break" />
            <span class="title-line">カウントダウン</span>
          </h1>
          <p>各大会までの残り日数を表示します</p>
        </div>
      </header>
      <main id="cards"></main>
      <footer>
        最終更新: <span id="today"></span><br />
        &copy; hakatablog.net
      </footer>
    </div>

    <script>
      const accessCounterNamespace = "hakatablog-net";
      const accessCounterName = "marathon-countdown-total";

      const events = [
        {
          name: "海の中道はるかぜマラソン",
          url: "https://fmfukuoka.co.jp/lp/harukaze39/",
          date: "2026-03-07",
          dayLabel: "土",
          startTime: "9:00スタート",
          result: {
            name: "K.N",
            record: "10km男子:55分09秒",
          },
        },
        {
          name: "さが桜マラソン2026",
          url: "https://sagasakura-marathon.jp",
          date: "2026-03-22",
          dayLabel: "日",
          weather: {
            officeCode: "410000",
            areaName: "南部",
            areaFallbackName: "佐賀県",
            sourceLabel: "気象庁 佐賀市の天気",
            sourceUrl: "https://www.data.jma.go.jp/yoho/data/jishin/met/kishoushien_Saga_Saga-shi.html",
          },
        },
        {
          name: "みずほPayPayドームリレーマラソン",
          url: "https://relaymarathon.jp",
          date: "2026-05-16",
          dayLabel: "土",
        },
        {
          name: "奥信濃100（100km トレラン）",
          url: "https://okushinano100.com",
          date: "2026-06-06",
          dayLabel: "土",
          startTime: "5:00～翌2:00",
        },
        {
          name: "行橋-別府 100キロウォーク",
          url: "https://yb100.jp",
          date: "2026-10-11",
          dayLabel: "土",
        },
        {
          name: "福岡マラソン2026",
          url: "https://www.f-marathon.jp",
          date: "2026-11-08",
          dayLabel: "日",
        },
      ];

      const formatDate = (dateStr, dayLabel) => {
        const [year, month, day] = dateStr.split("-").map(Number);
        return `${year}年${month}月${day}日(${dayLabel})`;
      };

      const daysUntil = (dateStr) => {
        const now = new Date();
        const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const [year, month, day] = dateStr.split("-").map(Number);
        const eventDate = new Date(year, month - 1, day);
        const diffMs = eventDate - startOfToday;
        return Math.ceil(diffMs / (1000 * 60 * 60 * 24));
      };

      const formatDateTime = (dateStr) =>
        new Date(dateStr).toLocaleString("ja-JP", {
          year: "numeric",
          month: "numeric",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });

      const weatherCodeMap = {
        "100": "晴れ",
        "101": "晴れ時々くもり",
        "102": "晴れ一時雨",
        "103": "晴れ時々雨",
        "104": "晴れ一時雪",
        "110": "晴れのち時々くもり",
        "111": "晴れのちくもり",
        "112": "晴れのち一時雨",
        "200": "くもり",
        "201": "くもり時々晴れ",
        "202": "くもり一時雨",
        "203": "くもり時々雨",
        "204": "くもり一時雪",
        "210": "くもりのち時々晴れ",
        "211": "くもりのち晴れ",
        "212": "くもりのち一時雨",
        "213": "くもりのち時々雨",
        "214": "くもりのち雨",
        "300": "雨",
        "301": "雨時々晴れ",
        "302": "雨時々止む",
        "303": "雨時々雪",
        "308": "雨で暴風を伴う",
        "311": "雨のち晴れ",
        "313": "雨のちくもり",
        "314": "雨のち時々雪",
        "400": "雪",
        "401": "雪時々晴れ",
        "402": "雪時々止む",
        "403": "雪時々雨",
        "411": "雪のち晴れ",
        "413": "雪のちくもり",
        "414": "雪のち雨",
      };

      const isSameDate = (left, right) => {
        const leftDate = new Date(left);
        const rightDate = new Date(right);
        return (
          leftDate.getFullYear() === rightDate.getFullYear() &&
          leftDate.getMonth() === rightDate.getMonth() &&
          leftDate.getDate() === rightDate.getDate()
        );
      };

      const findArea = (areas = [], weatherConfig) =>
        areas.find((area) => area.area.name === weatherConfig.areaName) ||
        areas.find((area) => area.area.name === weatherConfig.areaFallbackName) ||
        areas[0];

      const findForecastEntry = (timeSeries, weatherConfig, eventDate) => {
        for (const series of timeSeries) {
          const timeIndex = series.timeDefines.findIndex((time) => isSameDate(time, eventDate));
          if (timeIndex === -1) {
            continue;
          }

          const area = findArea(series.areas, weatherConfig);
          if (!area) {
            continue;
          }

          const weatherCode = area.weatherCodes?.[timeIndex];
          const weatherText = area.weathers?.[timeIndex] || weatherCodeMap[String(weatherCode)] || weatherCode;
          const pop = area.pops?.[timeIndex];
          const minTemp = area.tempsMin?.[timeIndex];
          const maxTemp = area.tempsMax?.[timeIndex];
          const reliability = area.reliabilities?.[timeIndex];

          if (!weatherText && !pop && !minTemp && !maxTemp) {
            continue;
          }

          return {
            weatherText,
            pop,
            minTemp,
            maxTemp,
            reliability,
          };
        }

        return null;
      };

      const buildWeatherMarkup = (weather, cardId) => {
        if (!weather) {
          return "";
        }

        return `
          <div class="weather" id="${cardId}">
            <div class="weather-label">天気予報</div>
            <div class="weather-summary weather-loading">最新予報を取得中...</div>
            <div class="weather-detail">気象庁の最新発表を読み込みます。</div>
            ${
              weather.sourceUrl
                ? `<div class="weather-source"><a href="${weather.sourceUrl}" target="_blank" rel="noopener noreferrer">${weather.sourceLabel}</a></div>`
                : ""
            }
          </div>
        `;
      };

      const weatherScheduleNote =
        "更新目安: 今日〜明後日 5時/11時/17時ごろ、週間 11時/17時ごろ。";

      const renderWeatherState = (element, weather, state) => {
        if (!element) {
          return;
        }

        if (state.type === "success") {
          const detailParts = [];
          if (state.data.pop !== undefined && state.data.pop !== null && state.data.pop !== "") {
            detailParts.push(`降水確率 ${state.data.pop}%`);
          }
          if (state.data.maxTemp || state.data.minTemp) {
            const tempLabel = [`最高 ${state.data.maxTemp ?? "--"}℃`, `最低 ${state.data.minTemp ?? "--"}℃`].join(" / ");
            detailParts.push(tempLabel);
          }
          if (state.data.reliability) {
            detailParts.push(`信頼度 ${state.data.reliability}`);
          }

          element.innerHTML = `
            <div class="weather-label">天気予報</div>
            <div class="weather-summary">${state.data.weatherText || "最新予報あり"}</div>
            <div class="weather-detail">${detailParts.join(" / ") || "詳細な数値予報は未掲載です。"}</div>
            <div class="weather-updated">発表: ${state.reportDatetime ? formatDateTime(state.reportDatetime) : "最新発表時刻は取得できませんでした"}</div>
            <div class="weather-detail">${weatherScheduleNote}</div>
            ${
              weather.sourceUrl
                ? `<div class="weather-source"><a href="${weather.sourceUrl}" target="_blank" rel="noopener noreferrer">${weather.sourceLabel}</a></div>`
                : ""
            }
          `;
          return;
        }

        if (state.type === "out_of_range") {
          element.innerHTML = `
            <div class="weather-label">天気予報</div>
            <div class="weather-summary">開催日の予報はまだ公開期間外です</div>
            <div class="weather-detail">気象庁の週間予報は発表時点から7日先までです。大会日が近づくと自動で表示されます。</div>
            <div class="weather-detail">${weatherScheduleNote}</div>
            ${
              weather.sourceUrl
                ? `<div class="weather-source"><a href="${weather.sourceUrl}" target="_blank" rel="noopener noreferrer">${weather.sourceLabel}</a></div>`
                : ""
            }
          `;
          return;
        }

        element.innerHTML = `
          <div class="weather-label">天気予報</div>
          <div class="weather-summary weather-error">最新予報を取得できませんでした</div>
          <div class="weather-detail">${state.message}</div>
          <div class="weather-detail">${weatherScheduleNote}</div>
          ${
            weather.sourceUrl
              ? `<div class="weather-source"><a href="${weather.sourceUrl}" target="_blank" rel="noopener noreferrer">${weather.sourceLabel}</a></div>`
              : ""
          }
        `;
      };

      const loadWeatherForecast = async (event, cardId) => {
        const weatherElement = document.getElementById(cardId);
        if (!event.weather || !weatherElement) {
          return;
        }

        try {
          const response = await fetch(
            `https://www.jma.go.jp/bosai/forecast/data/forecast/${event.weather.officeCode}.json`,
            { cache: "no-store" }
          );

          if (!response.ok) {
            throw new Error("気象庁データの取得に失敗しました。");
          }

          const forecast = await response.json();
          const reportDatetime = forecast[0]?.reportDatetime || forecast[1]?.reportDatetime;
          const dailyForecast =
            findForecastEntry(forecast[0]?.timeSeries || [], event.weather, event.date) ||
            findForecastEntry(forecast[1]?.timeSeries || [], event.weather, event.date);

          if (!dailyForecast) {
            renderWeatherState(weatherElement, event.weather, {
              type: "out_of_range",
            });
            return;
          }

          renderWeatherState(weatherElement, event.weather, {
            type: "success",
            reportDatetime,
            data: dailyForecast,
          });
        } catch (error) {
          renderWeatherState(weatherElement, event.weather, {
            type: "error",
            message: "通信環境や参照先の仕様変更により取得できない場合があります。",
          });
        }
      };

      const cards = document.getElementById("cards");
      events.forEach((event, index) => {
        const remaining = daysUntil(event.date);
        const card = document.createElement("section");
        card.className = "card";
        const weatherCardId = `weather-${index}`;
        const status =
          remaining >= 0
            ? `<span class="prefix">あと</span> <span class="number">${remaining}</span> <span class="suffix">日</span>`
            : "終了";
        const badge = remaining <= 30 && remaining >= 0 ? "30日以内" : "";
        const title = event.url
          ? `<a href="${event.url}" target="_blank" rel="noopener noreferrer">${event.name}</a>`
          : event.name;
        const resultSection = event.result
          ? `
          <details class="results">
            <summary>大会結果</summary>
            <div class="results-body">
              <div class="results-name">${event.result.name}（イニシャル）</div>
              <div>${event.result.record}</div>
            </div>
          </details>
        `
          : "";
        const weatherSection = buildWeatherMarkup(event.weather, weatherCardId);
        const dateText = event.startTime
          ? `${formatDate(event.date, event.dayLabel)} / ${event.startTime}`
          : formatDate(event.date, event.dayLabel);

        card.innerHTML = `
          <div class="title">${title}</div>
          <div class="date">${dateText}</div>
          <div class="countdown">
            <div class="days">${status}</div>
            <div class="label">開催まで</div>
          </div>
          ${badge ? `<span class="badge">${badge}</span>` : ""}
          ${weatherSection}
          ${resultSection}
        `;
        cards.appendChild(card);
        loadWeatherForecast(event, weatherCardId);
      });

      const today = new Date();
      document.getElementById("today").textContent = today.toLocaleDateString("ja-JP", {
        year: "numeric",
        month: "long",
        day: "numeric",
      });

      const loadAccessCounter = async () => {
        const counterElement = document.getElementById("access-counter");
        if (!counterElement) {
          return;
        }
        const formatAccessCount = (value) => String(value).padStart(6, "0");

        try {
          const response = await fetch(
            `https://api.counterapi.dev/v1/${accessCounterNamespace}/${accessCounterName}/up`,
            { cache: "no-store" }
          );

          if (!response.ok) {
            throw new Error("counter api error");
          }

          const result = await response.json();
          const value = result?.data?.up_count ?? result?.data?.count ?? result?.count;
          counterElement.textContent = typeof value === "number" ? formatAccessCount(value) : "------";
        } catch (error) {
          counterElement.textContent = "------";
          counterElement.title = "アクセスカウンターを取得できませんでした";
        }
      };

      loadAccessCounter();
    </script>
  <script>
    (() => {
      const latestWeatherUrl = 'https://www.jma.go.jp/bosai/#pattern=forecast&area_type=offices&area_code=410000';

      const shouldReplaceWeatherLink = (link) => {
        const href = link.getAttribute('href') || '';
        const text = (link.textContent || '').trim();
        return (
          href.includes('data.jma.go.jp/yoho/data/jishin/met/kishoushien_') ||
          href.includes('jma.go.jp') ||
          text.includes('天気') ||
          text.includes('気象庁')
        );
      };

      const rewriteWeatherLinks = () => {
        document.querySelectorAll('a').forEach((link) => {
          if (!shouldReplaceWeatherLink(link)) {
            return;
          }
          link.href = latestWeatherUrl;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          if (!link.getAttribute('aria-label')) {
            link.setAttribute('aria-label', '気象庁の最新天気予報（佐賀県）');
          }
        });
      };

      document.addEventListener(
        'click',
        (event) => {
          const link = event.target.closest('a');
          if (!link || !shouldReplaceWeatherLink(link)) {
            return;
          }
          link.href = latestWeatherUrl;
        },
        true
      );

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', rewriteWeatherLinks, { once: true });
      } else {
        rewriteWeatherLinks();
      }
    })();
  </script>
</body>
</html>
