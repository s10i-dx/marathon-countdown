<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>マラソン大会カウントダウン</title>
    <style>
      :root {
        --bg: #c0c0c0;
        --ink: #111111;
        --accent: #0000ee;
        --accent-2: #ff6600;
        --card: #ffffff;
        --muted: #333333;
        --border: #000000;
        --panel: #f4f4f4;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "MS PGothic", "MS Gothic", "Osaka", "Yu Gothic", sans-serif;
        color: var(--ink);
        background: var(--bg);
        min-height: 100vh;
      }
      .page {
        max-width: 960px;
        margin: 24px auto 32px;
        background: var(--card);
        border-radius: 0;
        padding: 16px 16px 20px;
        box-shadow: none;
        position: relative;
        border: 2px solid var(--border);
      }
      header {
        padding: 12px 8px 10px;
        text-align: center;
        border-bottom: 2px solid var(--border);
        margin-bottom: 12px;
        background: #dde7ff;
      }
      header h1 {
        margin: 0 0 6px;
        font-size: clamp(24px, 3.5vw, 36px);
        letter-spacing: 0.02em;
      }
      .title-line {
        display: block;
      }
      header p {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
      }
      main {
        margin: 0;
        padding: 0 6px 8px;
        display: grid;
        gap: 10px;
      }
      .card {
        background: var(--panel);
        border-radius: 0;
        padding: 12px 12px;
        box-shadow: none;
        display: grid;
        gap: 10px;
        position: relative;
        overflow: hidden;
        border: 1px solid var(--border);
      }
      .card::after {
        content: "";
        position: absolute;
        inset: 0;
        border-left: 4px solid var(--border);
        opacity: 1;
        pointer-events: none;
      }
      .title {
        font-size: 16px;
        font-weight: 700;
      }
      .title a {
        color: var(--accent);
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .title a:visited {
        color: #551a8b;
      }
      .title a:hover,
      .title a:focus-visible {
        text-decoration: underline;
      }
      .date {
        font-size: 12px;
        color: var(--muted);
      }
      .countdown {
        display: flex;
        align-items: baseline;
        gap: 12px;
      }
      .countdown .days {
        font-size: 26px;
        font-weight: 700;
        color: var(--ink);
        font-family: "MS PGothic", "MS Gothic", "Osaka", monospace;
      }
      .countdown .label {
        font-size: 12px;
        color: var(--muted);
      }
      .badge {
        background: #fff4e6;
        color: #a43f00;
        display: inline-block;
        padding: 4px 10px;
        border-radius: 0;
        font-size: 12px;
        letter-spacing: 0.04em;
        border: 1px solid #a43f00;
      }
      footer {
        text-align: center;
        padding: 10px 8px 0;
        color: var(--muted);
        font-size: 12px;
        border-top: 2px solid var(--border);
        margin-top: 8px;
      }
      @media (min-width: 720px) {
        main {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .card {
          min-height: 180px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <h1>
          <span class="title-line">マラソン大会</span>
          <span class="title-line">カウントダウン</span>
        </h1>
        <p>各大会までの残り日数を表示します</p>
      </header>
      <main id="cards"></main>
      <footer>
        最終更新: <span id="today"></span><br />
        &copy; hakatablog.net<br />
        <img
          src="http://accnt.lucky-moji-3677.chips.jp/cnt/accnt.php?cnt_id=2143219&ac_id=LAA1128060&mode=total"
          alt="アクセスカウンター"
        />
      </footer>
    </div>

    <script>
      const events = [
        {
          name: "海の中道はるかぜマラソン",
          url: "https://fmfukuoka.co.jp/lp/harukaze39/",
          date: "2026-03-07",
          dayLabel: "土",
        },
        {
          name: "さが桜マラソン2026",
          url: "https://sagasakura-marathon.jp",
          date: "2026-03-22",
          dayLabel: "日",
        },
        {
          name: "行橋-別府 100キロウォーク",
          url: "https://yb100.jp",
          date: "2026-10-11",
          dayLabel: "土",
        },
        {
          name: "福岡マラソン2026",
          url:"https://www.f-marathon.jp/app/福岡マラソン２０２６開催日決定のお知らせ/",
          date: "2026-11-08",
          dayLabel: "日",
        },
      ];

      const formatDate = (dateStr, dayLabel) => {
        const [year, month, day] = dateStr.split("-").map(Number);
        return `${year}年${month}月${day}日(${dayLabel})`;
      };

      const daysUntil = (dateStr) => {
        const now = new Date();
        const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const [year, month, day] = dateStr.split("-").map(Number);
        const eventDate = new Date(year, month - 1, day);
        const diffMs = eventDate - startOfToday;
        return Math.ceil(diffMs / (1000 * 60 * 60 * 24));
      };

      const cards = document.getElementById("cards");
      events.forEach((event) => {
        const remaining = daysUntil(event.date);
        const card = document.createElement("section");
        card.className = "card";
        const status = remaining >= 0 ? `あと ${remaining} 日` : "終了";
        const badge = remaining <= 30 && remaining >= 0 ? "30日以内" : "";
        const title = event.url
          ? `<a href="${event.url}" target="_blank" rel="noopener noreferrer">${event.name}</a>`
          : event.name;

        card.innerHTML = `
          <div class="title">${title}</div>
          <div class="date">${formatDate(event.date, event.dayLabel)}</div>
          <div class="countdown">
            <div class="days">${status}</div>
            <div class="label">開催まで</div>
          </div>
          ${badge ? `<span class="badge">${badge}</span>` : ""}
        `;
        cards.appendChild(card);
      });

      const today = new Date();
      document.getElementById("today").textContent = today.toLocaleDateString("ja-JP", {
        year: "numeric",
        month: "long",
        day: "numeric",
      });
    </script>
  </body>
</html>
