<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>マラソン大会カウントダウン</title>
    <style>
      :root {
        --bg: #f4efe5;
        --paper: rgba(255, 252, 245, 0.9);
        --ink: #1f2a2c;
        --muted: #5e6c70;
        --line: rgba(31, 42, 44, 0.14);
        --accent: #c64d2f;
        --accent-2: #206a5d;
        --shadow: 0 24px 60px rgba(56, 38, 20, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(198, 77, 47, 0.18), transparent 30%),
          radial-gradient(circle at top right, rgba(32, 106, 93, 0.16), transparent 28%),
          linear-gradient(180deg, #f7f2e9 0%, #efe5d6 100%);
      }

      .shell {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0 64px;
      }

      .hero {
        position: relative;
        overflow: hidden;
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--paper);
        box-shadow: var(--shadow);
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: auto -80px -80px auto;
        width: 220px;
        height: 220px;
        border-radius: 999px;
        background: rgba(198, 77, 47, 0.08);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--accent);
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 4rem);
        line-height: 1.05;
      }

      .lead {
        max-width: 52rem;
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.8;
      }

      .grid {
        display: grid;
        gap: 24px;
        margin-top: 28px;
      }

      .stats-bar {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        margin-top: 24px;
      }

      .stat-chip {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-height: 44px;
        padding: 10px 16px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--ink);
      }

      .stat-label {
        color: var(--muted);
        font-size: 0.82rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .stat-value {
        font-size: 1rem;
        font-weight: 800;
      }

      .race-card {
        display: grid;
        gap: 18px;
        padding: 26px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 16px 36px rgba(56, 38, 20, 0.08);
      }

      .race-head {
        display: flex;
        gap: 16px;
        justify-content: space-between;
        align-items: flex-start;
      }

      .race-title {
        margin: 0;
        font-size: clamp(1.5rem, 4vw, 2.3rem);
        line-height: 1.15;
      }

      .race-meta {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 0.98rem;
      }

      .distance {
        flex: 0 0 auto;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(32, 106, 93, 0.1);
        color: var(--accent-2);
        font-size: 0.9rem;
        font-weight: 700;
      }

      .countdown {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .count-box {
        padding: 18px 14px;
        border-radius: 18px;
        background: #fffdf8;
        border: 1px solid rgba(31, 42, 44, 0.08);
        text-align: center;
      }

      .count-value {
        display: block;
        font-size: clamp(1.8rem, 5vw, 3rem);
        font-weight: 800;
        line-height: 1;
      }

      .count-label {
        display: block;
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.85rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .race-footer {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
      }

      .date-note {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .link-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 999px;
        background: var(--ink);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }

      .link-button:hover {
        background: var(--accent);
      }

      @media (max-width: 720px) {
        .shell {
          width: min(100% - 20px, 960px);
          padding-top: 20px;
        }

        .hero,
        .race-card {
          padding: 20px;
        }

        .race-head {
          flex-direction: column;
        }

        .countdown {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Marathon Countdown</p>
        <h1>次の目標レースまでを、毎日見える化する。</h1>
        <p class="lead">
          参加予定の大会日までの残り時間をまとめたカウントダウンページです。大会公式サイトへの導線もここに集約します。
        </p>
        <div class="stats-bar" aria-label="ページ統計">
          <div class="stat-chip">
            <span class="stat-label">Access</span>
            <span class="stat-value" id="access-count">-</span>
          </div>
          <div class="stat-chip">
            <span class="stat-label">Last Visit</span>
            <span class="stat-value" id="last-visit">-</span>
          </div>
        </div>
      </section>

      <section class="grid" aria-label="大会一覧">
        <article
          class="race-card"
          data-race-date="2026-06-06T00:00:00+09:00"
          data-race-name="奥信濃100"
        >
          <div class="race-head">
            <div>
              <h2 class="race-title">奥信濃100</h2>
              <p class="race-meta">長野県木島平村エリア / 100km トレイルランニング</p>
            </div>
            <div class="distance">100km Trail</div>
          </div>

          <div class="countdown" aria-live="polite">
            <div class="count-box">
              <span class="count-value" data-unit="days">-</span>
              <span class="count-label">Days</span>
            </div>
            <div class="count-box">
              <span class="count-value" data-unit="hours">-</span>
              <span class="count-label">Hours</span>
            </div>
            <div class="count-box">
              <span class="count-value" data-unit="minutes">-</span>
              <span class="count-label">Minutes</span>
            </div>
            <div class="count-box">
              <span class="count-value" data-unit="seconds">-</span>
              <span class="count-label">Seconds</span>
            </div>
          </div>

          <div class="race-footer">
            <div class="date-note">開催日: 2026年6月6日</div>
            <a class="link-button" href="https://okushinano100.com" target="_blank" rel="noopener noreferrer">
              公式サイト
            </a>
          </div>
        </article>
      </section>
    </main>

    <script>
      const formatCountdown = (targetDate) => {
        const diff = Math.max(targetDate.getTime() - Date.now(), 0);
        const totalSeconds = Math.floor(diff / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        return { days, hours, minutes, seconds };
      };

      const updateRaceCard = (card) => {
        const targetDate = new Date(card.dataset.raceDate);
        const values = formatCountdown(targetDate);
        card.querySelector('[data-unit="days"]').textContent = values.days.toLocaleString("ja-JP");
        card.querySelector('[data-unit="hours"]').textContent = String(values.hours).padStart(2, "0");
        card.querySelector('[data-unit="minutes"]').textContent = String(values.minutes).padStart(2, "0");
        card.querySelector('[data-unit="seconds"]').textContent = String(values.seconds).padStart(2, "0");
      };

      const cards = Array.from(document.querySelectorAll("[data-race-date]"));
      const tick = () => cards.forEach(updateRaceCard);

      const accessCountElement = document.getElementById("access-count");
      const lastVisitElement = document.getElementById("last-visit");
      const accessCountKey = "marathonCountdownAccessCount";
      const lastVisitKey = "marathonCountdownLastVisit";
      const previousVisit = window.localStorage.getItem(lastVisitKey);
      const nextCount = Number(window.localStorage.getItem(accessCountKey) || "0") + 1;

      window.localStorage.setItem(accessCountKey, String(nextCount));
      window.localStorage.setItem(lastVisitKey, new Date().toISOString());

      accessCountElement.textContent = `${nextCount.toLocaleString("ja-JP")}回`;
      lastVisitElement.textContent = previousVisit
        ? new Intl.DateTimeFormat("ja-JP", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
          }).format(new Date(previousVisit))
        : "はじめてのアクセス";

      tick();
      window.setInterval(tick, 1000);
    </script>
  </body>
</html>
